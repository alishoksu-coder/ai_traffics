name: traffic_app
description: AI Traffic Monitor (OSM + REST)
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  google_maps_flutter: ^2.14.2
  permission_handler: ^12.0.1
  google_fonts: ^6.3.0
  geolocator: ^14.0.2
  custom_info_window: ^1.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png